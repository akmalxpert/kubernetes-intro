apiVersion: apps/v1
kind: Deployment
metadata:
  name: songs-service
  namespace: k8s-program
  labels:
    app: songs-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: songs-service
  template:
    metadata:
      labels:
        app: songs-service
    spec:
      containers:
        - name: songs-service
          image: songs-image:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: SONGS_MS_NAME
              value: "songs-ms"
            - name: SONGS_MS_PORT
              value: "8081"
            - name: SONGS_DB_URL
              value: "host.minikube.internal"
            - name: SONGS_DB_PORT
              value: "5432"
            - name: ENABLE_EUREKA_CLIENT
              value: "false"
          volumeMounts:
            - name: songs-storage
              mountPath: /app/data
      volumes:
        - name: songs-storage
          persistentVolumeClaim:
            claimName: songs-pvc
