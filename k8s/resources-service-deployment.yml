apiVersion: apps/v1
kind: Deployment
metadata:
  name: resources-service
  namespace: k8s-program
  labels:
    app: resources-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resources-service
  template:
    metadata:
      labels:
        app: resources-service
    spec:
      containers:
        - name: resources-service
          image: resources-image:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: RESOURCES_MS_NAME
              value: "resources-ms"
            - name: RESOURCES_MS_PORT
              value: "8080"
            - name: RESOURCES_DB_URL
              value: "resources-db"
            - name: RESOURCES_DB_PORT
              value: "5432"
            - name: SONGS_MS_URL
              value: "songs-service"
            - name: SONGS_MS_PORT
              value: "8081"
            - name: ENABLE_EUREKA_CLIENT
              value: "false"
